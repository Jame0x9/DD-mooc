<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHIDA MOOC - History</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Top Navbar */
        .navbar {
            background-color: #1a1a1a;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            padding: 0 50px;
            border-bottom: 2px solid #00bfff; /* Blue bottom border like in the image */
        }

        .nav-logo {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background-color: white;
            object-fit: cover;
            position: absolute;
            left: 50px;
        }

        .nav-title {
            color: #FFD700; /* Gold color */
            font-size: 1.8rem;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* History Content Container */
        .history-container {
            flex: 1;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 30px;
        }

        /* History Item Box */
        .history-card {
            background-color: #d9d9d9;
            width: 100%;
            max-width: 800px;
            height: 80px;
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            font-size: 1.2rem;
            color: #000;
        }

        /* Bottom Footer */
        .footer {
            background-color: #000000;
            height: 60px;
            width: 100%;
            margin-top: auto;
        }

        .empty-message {
            font-size: 1.2rem;
            color: #888;
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="{{ url_for('dashboard') }}">
            <img src="{{ url_for('static', filename='logo.jpg') }}" alt="Logo" class="nav-logo">
        </a>
        <div class="nav-title">History</div>
    </nav>

    <div class="history-container">
        
        {% if history_items %}
            {% for item in history_items %}
            <div class="history-card">
                <span class="date">{{ item.order_date.strftime('%Y-%m-%d') if item.order_date else '(date)' }}</span>
                <span class="course-name">{{ item.title }}</span>
                <span class="price">${{ item.price_at_purchase }}</span>
            </div>
            {% endfor %}
        {% else %}
            <div class="history-card">
                <span>(date)</span>
                <span>(course name)</span>
                <span>$price</span>
            </div>
            <div class="history-card">
                </div>
            <div class="empty-message">No purchase history found.</div>
        {% endif %}

    </div>

    <div class="footer"></div>

</body>
</html>
